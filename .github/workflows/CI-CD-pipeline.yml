name: CI/CD-pipeline

on:
  # Validate all changes on both long-lived branches.
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]
  workflow_dispatch:

jobs:
  # Run backend verification first to fail fast on API/server issues.
  test-backend:
    name: Test - Backend
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run backend tests in Docker
        run: |
          docker compose --profile test run --rm --entrypoint sh tests -c "npm ci --no-audit --no-fund && npm run test:backend:coverage"

  # Frontend validation runs after backend to keep execution order predictable.
  test-frontend:
    name: Test - Frontend
    runs-on: ubuntu-latest
    needs: test-backend
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run frontend tests in Docker
        run: |
          docker compose --profile test run --rm --entrypoint sh tests -c "npm ci --no-audit --no-fund && npm run test:frontend:coverage"

  # Build and publish container image only for non-PR events.
  build-and-push-backend-image:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/trinitydevapp-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/trinitydevapp-backend:latest

  # Production deployment is intentionally restricted to successful main pushes.
  deploy-to-ec2-prod:
    name: Deploy to EC2 (Prod)
    runs-on: ubuntu-latest
    needs: build-and-push-backend-image
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Copy deployment files to EC2 (Prod)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST_PROD || secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER_PROD || secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY_PROD || secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,database/schema.sql,.env"
          target: "~/trinity-deploy"

      - name: Deploy over SSH (Prod)
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          PAYPAL_MODE: ${{ secrets.PAYPAL_MODE }}
          PAYPAL_RETURN_URL: ${{ secrets.PAYPAL_RETURN_URL }}
          PAYPAL_CANCEL_URL: ${{ secrets.PAYPAL_CANCEL_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
        with:
          host: ${{ secrets.EC2_HOST_PROD || secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER_PROD || secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY_PROD || secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,IMAGE_TAG,DB_USER,DB_PASSWORD,DB_NAME,DB_PORT,JWT_SECRET,PAYPAL_CLIENT_ID,PAYPAL_CLIENT_SECRET,PAYPAL_MODE,PAYPAL_RETURN_URL,PAYPAL_CANCEL_URL,CORS_ORIGINS
          script: |
            set -e
            mkdir -p ~/trinity-deploy
            cd ~/trinity-deploy

            cp database/schema.sql ./schema.sql

            if [ -f docker-compose.yml ]; then
              echo "Using docker-compose.yml for production deploy"
            else
              echo "docker-compose.yml not found after file copy"
              exit 1
            fi

            if [ -f .env ]; then
              echo "Using .env from repository"
            else
              echo ".env not found after file copy"
              exit 1
            fi

            upsert_env() {
              local key="$1" val="$2"
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                echo "${key}=${val}" >> .env
              fi
            }

            upsert_env DOCKERHUB_USERNAME     "${DOCKERHUB_USERNAME}"
            upsert_env IMAGE_TAG              "${IMAGE_TAG}"
            upsert_env DB_USER                "${DB_USER}"
            upsert_env DB_PASSWORD            "${DB_PASSWORD}"
            upsert_env DB_NAME                "${DB_NAME}"
            upsert_env DB_PORT                "${DB_PORT}"
            upsert_env JWT_SECRET             "${JWT_SECRET}"
            upsert_env PAYPAL_CLIENT_ID       "${PAYPAL_CLIENT_ID}"
            upsert_env PAYPAL_CLIENT_SECRET   "${PAYPAL_CLIENT_SECRET}"
            upsert_env PAYPAL_MODE            "${PAYPAL_MODE}"
            upsert_env PAYPAL_RETURN_URL      "${PAYPAL_RETURN_URL}"
            upsert_env PAYPAL_CANCEL_URL      "${PAYPAL_CANCEL_URL}"
            upsert_env CORS_ORIGINS           "${CORS_ORIGINS}"

            docker compose -f docker-compose.yml --env-file .env pull
            docker compose -f docker-compose.yml --env-file .env up -d --remove-orphans
            sleep 8
            curl -kfsS https://127.0.0.1/api/test
