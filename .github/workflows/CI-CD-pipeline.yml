name: CI/CD-pipeline

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]
  workflow_dispatch:

jobs:
  test-backend:
    name: Test - Backend
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run backend tests in Docker
        run: |
          docker compose --profile test run --rm --entrypoint sh tests -c "npm ci --no-audit --no-fund && npm run test:backend:coverage"

  test-frontend:
    name: Test - Frontend
    runs-on: ubuntu-latest
    needs: test-backend
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run frontend tests in Docker
        run: |
          docker compose --profile test run --rm --entrypoint sh tests -c "npm ci --no-audit --no-fund && npm run test:frontend:coverage"

  build-and-push-backend-image:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/trinitydevapp-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/trinitydevapp-backend:latest

  deploy-to-ec2-http:
    name: Deploy to EC2 (HTTP Temp)
    runs-on: ubuntu-latest
    needs: build-and-push-backend-image
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deployment files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.http.yml,database/schema.sql,.env"
          target: "~/trinity-deploy"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          PAYPAL_MODE: ${{ secrets.PAYPAL_MODE }}
          PAYPAL_RETURN_URL: ${{ secrets.PAYPAL_RETURN_URL }}
          PAYPAL_CANCEL_URL: ${{ secrets.PAYPAL_CANCEL_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,IMAGE_TAG,DB_USER,DB_PASSWORD,DB_NAME,DB_PORT,JWT_SECRET,PAYPAL_CLIENT_ID,PAYPAL_CLIENT_SECRET,PAYPAL_MODE,PAYPAL_RETURN_URL,PAYPAL_CANCEL_URL,CORS_ORIGINS
          script: |
            set -e
            mkdir -p ~/trinity-deploy
            cd ~/trinity-deploy

            cp database/schema.sql ./schema.sql

            if [ -f docker-compose.http.yml ]; then
              echo "Using docker-compose.http.yml from repo root"
            else
              echo "docker-compose.http.yml not found after file copy"
              exit 1
            fi

            if [ -f .env ]; then
              echo "Using .env from repository"
            else
              echo ".env not found after file copy"
              exit 1
            fi

            if grep -q '^DOCKERHUB_USERNAME=' .env; then
              sed -i "s/^DOCKERHUB_USERNAME=.*/DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}/" .env
            else
              echo "DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}" >> .env
            fi

            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" .env
            else
              echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
            fi

            docker compose -f docker-compose.http.yml --env-file .env pull
            docker compose -f docker-compose.http.yml --env-file .env up -d --remove-orphans
            sleep 5
            curl -fsS http://127.0.0.1/api/test