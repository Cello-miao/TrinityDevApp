name: CI/CD-pipeline

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]
  workflow_dispatch:

jobs:
  test-backend:
    name: Test - Backend
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run backend tests in Docker
        run: |
          docker compose --profile test run --rm --entrypoint sh tests -c "npm ci --no-audit --no-fund && npm run test:backend:coverage"

  test-frontend:
    name: Test - Frontend
    runs-on: ubuntu-latest
    needs: test-backend
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run frontend tests in Docker
        run: |
          docker compose --profile test run --rm --entrypoint sh tests -c "npm ci --no-audit --no-fund && npm run test:frontend:coverage"

  build-and-push-backend-image:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/trinitydevapp-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/trinitydevapp-backend:latest

