name: CI/CD-pipeline

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]
  workflow_dispatch:

jobs:
  test-backend:
    name: Test - Backend
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run backend tests in Docker
        run: |
          docker compose --profile test run --rm --entrypoint sh tests -c "npm ci --no-audit --no-fund && npm run test:backend"

  test-frontend:
    name: Test - Frontend
    runs-on: ubuntu-latest
    needs: test-backend
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run frontend tests in Docker
        run: |
          docker compose --profile test run --rm --entrypoint sh tests -c "npm ci --no-audit --no-fund && npm run test:frontend"

  build-and-push-backend-image:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/trinitydevapp-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/trinitydevapp-backend:latest

  deployment-notes:
    name: Deployment Notes (Placeholder)
    runs-on: ubuntu-latest
    needs: build-and-push-backend-image
    if: github.event_name != 'pull_request'
    steps:
      - name: Future server deployment notes
        run: |
          echo "TODO (manual next step): Deploy the backend image to the remote server."
          echo "Suggested approach: pull image, replace running container, verify health endpoint, and keep rollback strategy."
          echo "When implementing deployment, read JWT from remote environment/secret manager (never hardcode in workflow or compose)."
          echo "This workflow intentionally does not perform remote deployment yet."