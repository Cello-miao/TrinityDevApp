name: Mirror to Epitech Organization

on:
  # Scheduled synchronization keeps the destination repository aligned,
  # even when no qualifying CI/CD workflow_run event occurs.
  #schedule:
  #  - cron: '0 0 */2 * *'

  # Event-driven synchronization: trigger when CI/CD pipeline completes
  # on either long-lived branch.
  workflow_run:
    workflows: ["CI/CD-pipeline"]
    types: [completed]
    branches:
      - dev
      - main

permissions:
  contents: write

jobs:
  mirror:
    name: Mirror All Branches
    runs-on: ubuntu-latest

    # Run on schedule, or when CI/CD-pipeline succeeds for either dev or main.
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'dev' ||
        github.event.workflow_run.head_branch == 'main'))

    steps:
      # Use full fetch history so all branches are available for mirroring.
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git Automation Bot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch and Map All Remote Branches
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_MIRROR_TOKEN }}
        run: |
          git remote set-url origin https://oauth2:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git fetch --all

          # Create local tracking branches for all remote branches.
          # 'git push --all' only pushes local refs.
          for branch in $(git branch -r | grep "origin/" | grep -v HEAD | sed 's|origin/||'); do
            git branch "$branch" "origin/$branch" 2>/dev/null || true
          done

      - name: Execute Full Mirror Push
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_MIRROR_TOKEN }}
          TARGET_REPO: EpitechMscInternationalPromo2027/I-DEV-801-INT-8-1-trinitydevapp-1
        run: |
          # Register destination repository as remote target.
          git remote add org-mirror https://oauth2:${GITHUB_TOKEN}@github.com/${TARGET_REPO}.git

          # Push all branches and tags without deleting target-only refs.
          git push --all org-mirror --force --verbose
          git push --tags org-mirror --force --verbose || true
