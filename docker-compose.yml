services:
  db:
    image: postgres:16-alpine
    container_name: trinity_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trinityshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trinityshop"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trinity_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: trinityshop
      DB_PORT: 5432
      JWT_SECRET: dev_secret_change_me
      PORT: 3000
    ports:
      - "3000:3000"

  tests:
    image: node:20-alpine
    container_name: trinity_tests
    working_dir: /app
    volumes:
      - ./:/app
      - tests_node_modules:/app/node_modules
    command: sh -c "if [ ! -d node_modules ]; then npm ci --no-audit --no-fund; fi; npm run test:coverage"
    profiles:
      - test

volumes:
  postgres_data:
  tests_node_modules:
