services:
  db:
    image: postgres:16-alpine
    container_name: trinity_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trinity_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: ${DB_HOST:-db}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT:-5432}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT:-3000}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      PAYPAL_MODE: ${PAYPAL_MODE:-sandbox}
      PAYPAL_RETURN_URL: ${PAYPAL_RETURN_URL:-freshcart://payment-success}
      PAYPAL_CANCEL_URL: ${PAYPAL_CANCEL_URL:-freshcart://payment-cancel}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://localhost:19006}
      ALLOW_INSECURE_HTTP: ${ALLOW_INSECURE_HTTP:-true}
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: trinity_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
      - "3443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

  tests:
    image: node:20-alpine
    container_name: trinity_tests
    working_dir: /app
    volumes:
      - ./:/app
      - tests_node_modules:/app/node_modules
    command: sh -c "if [ ! -d node_modules ]; then npm ci --no-audit --no-fund; fi; npm run test:coverage"
    profiles:
      - test

volumes:
  postgres_data:
  tests_node_modules:
